mode: multiple_cdrs
model:
  checkpoint: /xsdata/lzhlzh/26_36/FlowAB/FlowDesign/trained_models/checkpoint_best.pt

sampling:
  seed: 2022
  sample_structure: true
  sample_sequence: true
  cdrs:
    - H_CDR1
    - H_CDR2
    - H_CDR3
    - L_CDR1
    - L_CDR2
    - L_CDR3
  num_samples: 32
  single: false
  multi: true
  scope: 0.4
  energy_guidance:
    enabled: false
    start_step: 49
    end_step: 59
    warmup_steps: 0

dataset:
  test:
    type: sabdab
    summary_path: ./data/sabdab_summary_all.tsv
    chothia_dir: ./data/all_structures/chothia
    processed_dir: ./data/processed_RF
    split: test
