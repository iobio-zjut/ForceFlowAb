model:
  type: rectflow
  res_feat_dim: 128
  pair_feat_dim: 64
  diffusion:
    num_steps: 100
    eps_net_opt:
      num_layers: 6
      encoder_opt:
        moe:
          use_moe: true
          n_routed_experts: 4
          num_experts_per_tok: 2
          n_shared_experts: 1
          aux_loss_alpha: 0.01
          scoring_func: softmax
          seq_aux: true
          norm_topk_prob: true
  train_structure: true
  train_sequence: true

train:
  loss_weights:
    seq: 1.0
    pos: 1.0
    qua: 1.0
    aux: 1.0
    hydropathy: 1.0
    charge: 1.0
  max_iters: 200_000
  val_freq: 2000
  batch_size: 16
  seed: 2022
  max_grad_norm: 100.0
  optimizer:
    type: adam
    lr: 1.e-4
    weight_decay: 0.
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.8
    patience: 10
    min_lr: 5.e-6
  ema:
    decay: 0.995

dataset:
  train:
    type: sabdab
    summary_path: ./data/sabdab_summary_all.tsv
    chothia_dir: ./data/all_structures/chothia
    processed_dir: ./data/processed_RF
    split: train
    transform:
    - type: mask_multiple_cdrs
    - type: merge_chains
    - type: patch_around_anchor
  val:
    type: sabdab
    summary_path: ./data/sabdab_summary_all.tsv
    chothia_dir: ./data/all_structures/chothia
    processed_dir: ./data/processed_RF
    split: val
    transform:
    - type: mask_single_cdr
      selection: CDR3
    - type: merge_chains
    - type: patch_around_anchor
